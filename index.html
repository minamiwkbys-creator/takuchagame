<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>たくちゃの商店街ランニング</title>
    <style>
        body {
            margin: 0;
            background: #2b2b2b;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #f5f5f5;
            font-family: 'Hiragino Kaku Gothic ProN', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        h1 {
            font-size: 16px;
            margin: 5px 0;
            color: #eceff1;
            text-shadow: 1px 1px #37474f;
        }
        #canvasContainer {
            position: relative;
            width: 95vw; 
            max-width: 600px;
        }
        canvas {
            border: 4px solid #cfd8dc;
            /* ★目に優しいくすんだペールブルーに変更 */
            background: #b0c8f0; 
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            display: block;
            width: 100%; 
            height: auto;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.25);
        }
        .msg {
            font-size: 16px;
            font-weight: bold;
            background: rgba(40,40,40,0.9);
            padding: 12px 20px;
            border-radius: 8px;
            text-align: center;
            border: 2px solid #cfd8dc;
            line-height: 1.6;
            width: 80%;
            color: #fff;
        }
    </style>
</head>
<body>

    <h1>たくちゃの商店街ランニング</h1>
    <div id="canvasContainer">
        <canvas id="gameCanvas" width="600" height="350"></canvas>
        <div id="ui">
            <div id="startMessage" class="msg">画面をタップ 又は スペースで開始！</div>
        </div>
    </div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const ui = document.getElementById('ui');
const startMessage = document.getElementById('startMessage');

let gameState = 'START'; 
let score = 0;
let frameCount = 0;

const GROUND_Y = canvas.height - 50;
const D = 3; 

// ★全体的に彩度を落とした、目に優しいマイルドなカラーパレット
const PALETTE = {
    skin: '#fcdcb0',      
    takachaHair: '#3a3a3a', 
    yokoharaHair: '#edd06d', // 落ち着いたマスタード金髪
    shirtGreen: '#5fa375',   // くすんだ緑
    pantsBlue: '#5c7299',    // グレイッシュな青
    shoesRed: '#d16262',     // 優しいあずき色系の赤
    brick: '#ad6c56',        // 落ち着いたレンガ色
    window: '#e3f2fd',
    carrotOrange: '#f58247', // チカチカしないにんじん色
    carrotLeaf: '#7cb374'    // 優しい葉っぱの緑
};

const player = {
    x: 80,
    y: GROUND_Y - (14 * D),
    baseWidth: 12 * D,
    baseHeight: 14 * D,
    width: 12 * D,
    height: 14 * D,
    gravity: 0.5,      
    jumpForce: -12.5,  
    velocity: 0,
    isGrounded: true,
    isBig: false,
    bigTimer: 0,
    startMessageTimer: 0 // ★「がんばるぞ！」用のタイマー
};

let obstacles = [];
const obstacleSpeed = 4.5;
let spawnTimer = 0;
let nextSpawnInterval = 100;
let items = [];
let shops = [];
let shopSpawnCount = 0; 

// ★お店のカラーもパレット調の優しいトーンに変更
const shopTemplates = [
    { name: '八百屋', wall: '#f5eae1', roof: '#cc7474', tent: '#81b393' },
    { name: 'パン屋', wall: '#ede1d1', roof: '#7093c4', tent: '#d9a773' },
    { name: 'カフェ', wall: '#e1edea', roof: '#948279', tent: '#6ba69e' },
    { name: '本屋', wall: '#e8e1ed', roof: '#8d7cb3', tent: '#a37ca8' }
];

const charCache = {};
function preRenderCharacters() {
    ['takacha', 'yokohara'].forEach(type => {
        charCache[type] = [];
        for (let pattern = 0; pattern < 2; pattern++) {
            const cCanvas = document.createElement('canvas');
            cCanvas.width = 12 * D;
            cCanvas.height = 14 * D;
            const cCtx = cCanvas.getContext('2d');
            
            const hairColor = (type === 'takacha') ? PALETTE.takachaHair : PALETTE.yokoharaHair;
            cCtx.fillStyle = hairColor;
            
            if (type === 'takacha') {
                // たくちゃ：丸っこい黒髪マッシュヘア
                cCtx.fillRect(2*D, 0, 8*D, D); cCtx.fillRect(1*D, D, 10*D, D);
                cCtx.fillRect(0, 2*D, 12*D, D); cCtx.fillRect(0, 3*D, 12*D, D);
            } else {
                cCtx.fillRect(3*D, 0, 6*D, D); cCtx.fillRect(1*D, D, 10*D, D);
                cCtx.fillRect(1*D, 2*D, 10*D, D); cCtx.fillRect(1*D, 3*D, 10*D, D);
                cCtx.fillStyle = PALETTE.skin; cCtx.fillRect(4*D, 3*D, 4*D, D); 
            }
            
            cCtx.fillStyle = PALETTE.skin; cCtx.fillRect(1*D, 4*D, 10*D, 3*D);
            cCtx.fillStyle = hairColor; cCtx.fillRect(0, 4*D, 2*D, D); cCtx.fillRect(10*D, 4*D, 2*D, D);
            if (type === 'takacha') { cCtx.fillRect(0, 5*D, 2*D, D); cCtx.fillRect(10*D, 5*D, 2*D, D); }
            
            cCtx.fillStyle = '#333'; cCtx.fillRect(4*D, 5*D, D, 1.5*D); cCtx.fillRect(7*D, 5*D, D, 1.5*D);
            cCtx.fillStyle = PALETTE.shoesRed; cCtx.fillRect(5.5*D, 7*D, D, D);
            cCtx.fillStyle = (type === 'takacha') ? PALETTE.shirtGreen : '#e08b5c';
            cCtx.fillRect(3*D, 8*D, 6*D, 3*D);
            
            if (pattern === 0) {
                cCtx.fillRect(2*D, 8*D, D, 2*D); cCtx.fillRect(9*D, 9*D, D, 2*D);
            } else {
                cCtx.fillRect(2*D, 9*D, D, 2*D); cCtx.fillRect(9*D, 8*D, D, 2*D);
            }
            
            cCtx.fillStyle = PALETTE.pantsBlue; cCtx.fillRect(3*D, 11*D, 6*D, 2*D);
            cCtx.fillStyle = PALETTE.shoesRed;
            if (pattern === 0) {
                cCtx.fillRect(2*D, 13*D, 2*D, D); cCtx.fillRect(6*D, 13*D, 2*D, D);
            } else {
                cCtx.fillRect(4*D, 13*D, 2*D, D); cCtx.fillRect(8*D, 13*D, 2*D, D);
            }
            charCache[type].push(cCanvas);
        }
    });
}

function initShops() {
    shops = []; shopSpawnCount = 0;
    for(let i = 0; i < 4; i++) {
        let temp = shopTemplates[i % shopTemplates.length];
        shops.push({
            x: i * 180, width: 140, height: 130, name: temp.name, wall: temp.wall, roof: temp.roof, tent: temp.tent,
            yokohara: { hasSpawned: false, hasThrown: false, isEaten: false, throwTimer: 0 }
        });
    }
}

function drawCachedCharacter(x, y, type, animFrame, scale = 1.0) {
    const legPattern = Math.floor(animFrame / 8) % 2;
    const img = charCache[type][legPattern];
    const w = 12 * D * scale;
    const h = 14 * D * scale;
    const bobbing = (legPattern === 0 && gameState === 'PLAYING') ? (D * scale) : 0;
    ctx.drawImage(img, Math.round(x), Math.round(y + bobbing), Math.round(w), Math.round(h));
}

function drawShoppingStreet() {
    shops.forEach(shop => {
        if (gameState === 'PLAYING') shop.x -= 1.5;
        if (shop.x + shop.width < 0) {
            shop.x = canvas.width + Math.random() * 30;
            shopSpawnCount++; 
            shop.yokohara.hasSpawned = (shopSpawnCount % 7 === 0);
            shop.yokohara.hasThrown = false; shop.yokohara.isEaten = false; shop.yokohara.throwTimer = 0;
        }

        const sy = GROUND_Y - shop.height;
        ctx.fillStyle = shop.roof; ctx.fillRect(shop.x - 5, sy - 15, shop.width + 10, 15);
        ctx.fillStyle = shop.wall; ctx.fillRect(shop.x, sy, shop.width, shop.height);
        ctx.fillStyle = shop.tent; ctx.fillRect(shop.x, sy + 5, shop.width, 15);
        ctx.fillStyle = '#fff';
        for(let j=10; j<shop.width; j+=30) ctx.fillRect(shop.x + j, sy + 5, 15, 15);

        ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(shop.x + 20, sy - 12, shop.width - 40, 12);
        ctx.fillStyle = '#fff'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
        ctx.fillText(shop.name, shop.x + shop.width/2, sy - 2);

        ctx.fillStyle = PALETTE.window; ctx.fillRect(shop.x + 50, sy + 30, 40, 40);
        ctx.strokeStyle = '#90a4ae'; ctx.lineWidth = 2; ctx.strokeRect(shop.x + 50, sy + 30, 40, 40);
        ctx.fillStyle = '#8d6e63'; ctx.fillRect(shop.x + 15, GROUND_Y - 45, 25, 45);

        if (shop.yokohara.hasSpawned) {
            let yokoX = shop.x + shop.width - 25;
            let yokoY = GROUND_Y - (14 * D);
            
            drawCachedCharacter(yokoX, yokoY, 'yokohara', frameCount, 1.0);

            if (!shop.yokohara.hasThrown && gameState === 'PLAYING') {
                shop.yokohara.throwTimer++;
                if (shop.yokohara.throwTimer === 20) {
                    items.push({ x: yokoX - 10, y: yokoY, width: 22, height: 22, vY: -4, vX: -2, isGrounded: false, parentShop: shop });
                    shop.yokohara.hasThrown = true;
                }
            }

            let msg = '「たくちゃ!」';
            if (shop.yokohara.isEaten) msg = '「おつかいがんばれ!」';

            ctx.fillStyle = '#fff'; ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
            ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
            let textWidth = ctx.measureText(msg).width + 16;
            ctx.fillRect(yokoX + 15 - textWidth/2, yokoY - 28, textWidth, 22);
            ctx.strokeRect(yokoX + 15 - textWidth/2, yokoY - 28, textWidth, 22);
            ctx.fillStyle = '#333'; ctx.fillText(msg, yokoX + 15, yokoY - 13);
        }
    });
}

function drawCuteGround() {
    ctx.fillStyle = PALETTE.brick; ctx.fillRect(0, GROUND_Y, canvas.width, canvas.height - GROUND_Y);
    ctx.fillStyle = '#c4846e'; 
    for(let x = 0; x < canvas.width; x += 24) {
        ctx.fillRect(x, GROUND_Y + 4, 16, 6); ctx.fillRect(x + 12, GROUND_Y + 16, 16, 6);
    }
}

function handleObstacles() {
    for (let i = obstacles.length - 1; i >= 0; i--) {
        let obs = obstacles[i];
        if (gameState === 'PLAYING') {
            if (obs.isKicked) {
                obs.x += 8; obs.kickedVY += 0.5; obs.y += obs.kickedVY;
            } else {
                obs.x -= obstacleSpeed;
            }
        }

        let obsY = obs.isKicked ? obs.y : (GROUND_Y - obs.height);

        ctx.fillStyle = PALETTE.carrotOrange; ctx.beginPath();
        ctx.moveTo(obs.x, obsY); ctx.lineTo(obs.x + obs.width, obsY); ctx.lineTo(obs.x + obs.width/2, obsY + obs.height);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = PALETTE.carrotLeaf; ctx.fillRect(obs.x + obs.width/2 - 4, obsY - 8, 8, 8);

        if (!obs.isKicked && obs.x + obs.width < player.x && !obs.passed) {
            score++; obs.passed = true;
        }

        if (!obs.isKicked && player.x < obs.x + obs.width && player.x + player.width > obs.x && player.y < obsY + obs.height && player.y + player.height > obsY) {
            if (player.isBig) {
                obs.isKicked = true; obs.y = obsY; obs.kickedVY = -8; score += 2; 
            } else {
                gameState = 'GAMEOVER';
                startMessage.innerHTML = `GAME OVER<br><span style="color:#e57373;">SCORE: ${score}</span><br><span style="font-size:14px; color:#fff;">タップで再挑戦</span>`;
                ui.style.display = 'flex';
            }
        }
        if (obs.x > canvas.width || obs.x + obs.width < 0) obstacles.splice(i, 1);
    }
}

function handleItems() {
    for (let i = items.length - 1; i >= 0; i--) {
        let item = items[i];
        if (gameState === 'PLAYING') {
            item.x += item.vX; item.vX *= 0.95;   
            if (!item.isGrounded) {
                item.y += item.vY; item.vY += 0.2; 
                if (item.y + item.height >= GROUND_Y) { item.y = GROUND_Y - item.height; item.isGrounded = true; item.vX = -1.5; }
            } else { item.x -= 1.5; }
        }

        ctx.fillStyle = '#2d2d2d'; ctx.fillRect(item.x, item.y, item.width, item.height);
        ctx.fillStyle = '#fafafa'; ctx.fillRect(item.x + 3, item.y + 3, item.width - 6, item.height - 6);
        ctx.fillStyle = '#d16262'; ctx.fillRect(item.x + 8, item.y + 8, item.width - 16, item.height - 16);

        if (player.x < item.x + item.width && player.x + player.width > item.x && player.y < item.y + item.height && player.y + player.height > item.y) {
            player.isBig = true; 
            // ★無敵状態を7秒（60fps × 7秒 = 420フレーム）に延長
            player.bigTimer = 420; 
            player.width = player.baseWidth * 1.6; player.height = player.baseHeight * 1.6;
            if (item.parentShop) item.parentShop.yokohara.isEaten = true;
            items.splice(i, 1); continue;
        }
        if (item.x + item.width < 0) items.splice(i, 1);
    }
}

function drawScore() {
    ctx.fillStyle = '#fff'; ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'left'; ctx.strokeStyle = '#37474f'; ctx.lineWidth = 3;
    let text = `SCORE: ${score}`;
    if (player.isBig) { 
        text += ` ✨むてき! (${Math.ceil(player.bigTimer / 60)})`; 
        ctx.fillStyle = '#fff59d'; // パステルイエローに変更してマイルドに
    }
    ctx.strokeText(text, 20, 35); ctx.fillText(text, 20, 35);
}

// ★たくちゃのスタート時の吹き出しを描画する関数
function drawPlayerSpeech(px, py) {
    if (gameState === 'PLAYING' && player.startMessageTimer > 0) {
        player.startMessageTimer--;
        
        let msg = '「がんばるぞ!」';
        ctx.fillStyle = '#fff'; ctx.strokeStyle = '#555'; ctx.lineWidth = 1;
        ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
        
        let textWidth = ctx.measureText(msg).width + 16;
        // キャラクターの少し上に吹き出しを配置
        let bubbleX = px + player.width / 2;
        let bubbleY = py - 15;
        
        ctx.fillRect(bubbleX - textWidth/2, bubbleY - 22, textWidth, 22);
        ctx.strokeRect(bubbleX - textWidth/2, bubbleY - 22, textWidth, 22);
        ctx.fillStyle = '#333'; ctx.fillText(msg, bubbleX, bubbleY - 7);
    }
}

function resetGame() {
    player.width = player.baseWidth; player.height = player.baseHeight;
    player.y = GROUND_Y - player.height; player.velocity = 0; player.isGrounded = true; player.isBig = false; player.bigTimer = 0;
    player.startMessageTimer = 0;
    obstacles = []; items = []; score = 0; spawnTimer = 0; initShops();
}

function gameLoop() {
    frameCount++;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawShoppingStreet();
    drawCuteGround();

    if (gameState === 'PLAYING') {
        if (player.isBig) {
            player.bigTimer--;
            if (player.bigTimer <= 0) {
                player.isBig = false; player.width = player.baseWidth; player.height = player.baseHeight; player.y = GROUND_Y - player.height;
            }
        }
        player.velocity += player.gravity; player.y += player.velocity;
        if (player.y + player.height >= GROUND_Y) { player.y = GROUND_Y - player.height; player.velocity = 0; player.isGrounded = true; }

        spawnTimer++;
        if (spawnTimer >= nextSpawnInterval) {
            let randHeight = Math.floor(Math.random() * 30) + 25;
            let randWidth = Math.floor(randHeight * 0.6) + 3;
            obstacles.push({ x: canvas.width, width: randWidth, height: randHeight, isKicked: false, kickedVY: 0 });
            spawnTimer = 0; nextSpawnInterval = Math.floor(Math.random() * 80) + 60; 
        }
    }

    handleItems(); handleObstacles();
    
    let currentScale = player.isBig ? 1.6 : 1.0;
    let currentY = player.isBig ? (GROUND_Y - player.height) : player.y;
    drawCachedCharacter(player.x, currentY, 'takacha', frameCount, currentScale);
    
    // ★「がんばるぞ！」の吹き出しを描画
    drawPlayerSpeech(player.x, currentY);
    
    drawScore();
    requestAnimationFrame(gameLoop);
}

function triggerAction(e) {
    if (e.type === 'keydown' && e.code !== 'Space') return;
    if (e.cancelable) e.preventDefault(); 

    if (gameState === 'START') {
        gameState = 'PLAYING'; ui.style.display = 'none'; initShops();
        player.startMessageTimer = 240; // ★スタートから約2秒間（120フレーム）セリフを表示
    } else if (gameState === 'PLAYING') {
        if (player.isGrounded) { player.velocity = player.jumpForce; player.isGrounded = false; }
    } else if (gameState === 'GAMEOVER') {
        resetGame(); gameState = 'PLAYING'; ui.style.display = 'none';
        player.startMessageTimer = 240; // ★リトライ時もセリフを表示
    }
}

window.addEventListener('touchstart', triggerAction, { passive: false });
window.addEventListener('mousedown', triggerAction);
window.addEventListener('keydown', triggerAction);

preRenderCharacters();
initShops();
gameLoop();
</script>
</body>
</html>
